    <!-- Core JavaScript -->
    <script src="static/js/app.js"></script>
    <script>
        // Language switcher
        function switchLanguage(lang) {
            const currentPath = window.location.pathname;
            const currentFile = currentPath.split('/').pop() || 'index_en.html';
            
            // Extract the page name (without language suffix)
            const pageName = currentFile.replace(/_[a-z]{2}\.html$/, '');
            
            // Redirect to the same page in the new language
            window.location.href = pageName + '_' + lang + '.html';
        }
    </script>
    
<script>
    let allSparks = [];
    let filteredSparks = [];
    let currentFilter = 'all';
    let currentSort = 'newest';
    let currentSparkId = null;

    document.addEventListener('DOMContentLoaded', function() {
        loadCollection();
        setupEventListeners();
    });

    function setupEventListeners() {
        // Search
        document.getElementById('searchInput').addEventListener('input', function(e) {
            filterAndDisplaySparks();
        });

        // Type filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.type;
                filterAndDisplaySparks();
            });
        });

        // Sort
        document.getElementById('sortSelect').addEventListener('change', function() {
            currentSort = this.value;
            filterAndDisplaySparks();
        });
    }

    function loadCollection() {
        allSparks = JarOfJoy.getSparks();
        document.getElementById('totalCount').textContent = allSparks.length;
        filterAndDisplaySparks();
    }

    function filterAndDisplaySparks() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        // Filter by type
        filteredSparks = currentFilter === 'all' 
            ? [...allSparks]
            : allSparks.filter(spark => spark.type === currentFilter);

        // Filter by search term
        if (searchTerm) {
            filteredSparks = filteredSparks.filter(spark =>
                spark.content.toLowerCase().includes(searchTerm)
            );
        }

        // Sort
        sortSparks(filteredSparks);

        // Display
        displaySparks(filteredSparks);
    }

    function sortSparks(sparks) {
        switch(currentSort) {
            case 'newest':
                sparks.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                break;
            case 'oldest':
                sparks.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                break;
            case 'random':
                sparks.sort(() => Math.random() - 0.5);
                break;
        }
    }

    function displaySparks(sparks) {
        const grid = document.getElementById('collectionGrid');
        const emptyState = document.getElementById('emptyState');

        if (sparks.length === 0) {
            grid.style.display = 'none';
            emptyState.style.display = 'flex';
            return;
        }

        grid.style.display = 'grid';
        emptyState.style.display = 'none';
        grid.innerHTML = '';

        sparks.forEach(spark => {
            const card = createCollectionCard(spark);
            grid.appendChild(card);
        });
    }

    function createCollectionCard(spark) {
        const card = document.createElement('div');
        card.className = 'collection-card';
        card.onclick = () => openModal(spark);

        const date = new Date(spark.timestamp);
        const formattedDate = date.toLocaleDateString('en', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
        });

        const typeIcons = {
            memory: 'photo_camera',
            quote: 'format_quote',
            gratitude: 'favorite',
            achievement: 'emoji_events'
        };

        const truncatedContent = spark.content.length > 150 
            ? spark.content.substring(0, 150) + '...'
            : spark.content;

        card.innerHTML = `
            <div class="card-content">
                <div class="card-header">
                    <span class="material-symbols-outlined card-icon">${typeIcons[spark.type] || 'auto_awesome'}</span>
                    <span class="card-date">${formattedDate}</span>
                </div>
                <p class="card-text">${escapeHtml(truncatedContent)}</p>
            </div>
        `;

        return card;
    }

    function openModal(spark) {
        currentSparkId = spark.id;
        const modal = document.getElementById('sparkModal');

        const typeIcons = {
            memory: 'photo_camera',
            quote: 'format_quote',
            gratitude: 'favorite',
            achievement: 'emoji_events'
        };

        const typeLabels = {
            memory: 'Memory',
            quote: 'Quote',
            gratitude: 'Gratitude',
            achievement: 'Achievement'
        };

        // Update modal content
        document.getElementById('modalTypeIcon').textContent = typeIcons[spark.type] || 'auto_awesome';
        document.getElementById('modalTypeLabel').textContent = typeLabels[spark.type] || spark.type;

        const date = new Date(spark.timestamp);
        const formattedDate = date.toLocaleDateString('en', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
        document.getElementById('modalDate').textContent = formattedDate;

        document.getElementById('modalText').textContent = spark.content;

        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('sparkModal').style.display = 'none';
        document.body.style.overflow = 'auto';
        currentSparkId = null;
    }

    function deleteSpark() {
        if (!currentSparkId) return;

        if (confirm('Are you sure? This cannot be undone.')) {
            JarOfJoy.deleteSpark(currentSparkId);
            closeModal();
            loadCollection();
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
