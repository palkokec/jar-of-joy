    <script>
        // Language switcher
        function switchLanguage(lang) {
            const currentPath = window.location.pathname;
            const currentFile = currentPath.split('/').pop() || 'index_sk.html';
            
            // Extract the page name (without language suffix)
            const pageName = currentFile.replace(/_[a-z]{2}\.html$/, '');
            
            // Redirect to the same page in the new language
            window.location.href = pageName + '_' + lang + '.html';
        }
    </script>
    
<script>
    let currentSparkIndex = -1;
    let availableSparks = [];

    document.addEventListener('DOMContentLoaded', function() {
        loadRandomSpark();
    });

    function loadRandomSpark() {
        const sparks = JarOfJoy.getSparks();
        const emptyState = document.getElementById('emptyState');
        const sparkCard = document.getElementById('sparkCard');

        if (sparks.length === 0) {
            emptyState.style.display = 'flex';
            sparkCard.style.display = 'none';
            return;
        }

        emptyState.style.display = 'none';
        sparkCard.style.display = 'block';

        // Get random spark
        const randomIndex = Math.floor(Math.random() * sparks.length);
        const spark = sparks[randomIndex];
        currentSparkIndex = randomIndex;

        displaySpark(spark);
    }

    function revealAnotherSpark() {
        // Add fade out animation
        const sparkCard = document.getElementById('sparkCard');
        sparkCard.style.opacity = '0';
        sparkCard.style.transform = 'scale(0.95)';

        setTimeout(() => {
            loadRandomSpark();
            sparkCard.style.opacity = '1';
            sparkCard.style.transform = 'scale(1)';
        }, 300);
    }

    function displaySpark(spark) {
        const typeIcons = {
            memory: 'photo_camera',
            quote: 'format_quote',
            gratitude: 'favorite',
            achievement: 'emoji_events'
        };

        const typeLabels = {
            memory: 'Spomienka',
            quote: 'Citát',
            gratitude: 'Vďačnosť',
            achievement: 'Úspech'
        };

        // Update type badge
        document.getElementById('sparkTypeIcon').textContent = typeIcons[spark.type] || 'auto_awesome';
        document.getElementById('sparkTypeLabel').textContent = typeLabels[spark.type] || spark.type;

        // Update date
        const date = new Date(spark.timestamp);
        const formattedDate = date.toLocaleDateString('sk', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        document.getElementById('sparkDate').textContent = 'Zachytené ' + formattedDate;

        // Update content
        document.getElementById('sparkText').textContent = spark.content;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
